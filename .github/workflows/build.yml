name: Build Cross-Platform App
on: [push] # Triggers every time you push code

jobs:
  build:
    strategy:
      matrix:
        # This tells GitHub to run this job 3 times on 3 different OS types
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyInstaller
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        # --onefile bundles everything into a single executable
        # --noconsole hides the black terminal window (standard for GUI apps)
        run: pyinstaller --onefile --noconsole app.py

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ matrix.os }}
          path: dist/*
